# AnonOS Hacker Terminal Theme
# "In the beginning there was nothing, and then there was green."

font_family      JetBrains Mono Nerd Font
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size 12

foreground #00ff00
background #000000
selection_background #003300
selection_foreground #00ff00

cursor #00ff00
cursor_text_color #000000
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

url_color #00aa00

# Black
color0 #000000
color8 #003300

# Red
color1 #ff0000
color9 #ff4444

# Green
color2  #00ff00
color10 #44ff44

# Yellow
color3  #ffff00
color11 #ffff44

# Blue
color4  #006600
color12 #00aa00

# Magenta
color5  #00aa00
color13 #44ff44

# Cyan
color6  #00ff44
color14 #44ff88

# White
color7  #00cc00
color15 #00ff00

mark1_foreground #000000
mark1_background #00ff00

allow_remote_control yes
shell_integration enabled
confirm_os_window_close 0
scrollback_lines 10000
enable_audio_bell no
visual_bell_duration 0.5
window_padding_width 4
hide_when_typing yes
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style angled
tab_activity_symbol "█"
background_opacity 0.92
dynamic_background_opacity yes
