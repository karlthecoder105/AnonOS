INCLUDE archiso_head.cfg

DEFAULT anonos
TIMEOUT 150

LABEL anonos
TEXT HELP
Boot AnonOS via PXE.
ENDTEXT
MENU LABEL AnonOS (PXE)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% ip=dhcp quiet loglevel=3

LABEL anonos-nfs
TEXT HELP
Boot AnonOS via NFS root.
ENDTEXT
MENU LABEL AnonOS (NFS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% net=nfs quiet loglevel=3

LABEL reboot
TEXT HELP
Reboot computer.
ENDTEXT
MENU LABEL Reboot
COM32 reboot.c32

LABEL poweroff
TEXT HELP
Power off computer.
ENDTEXT
MENU LABEL Power Off
COM32 poweroff.c32
