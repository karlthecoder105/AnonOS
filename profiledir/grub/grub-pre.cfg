# AnonOS GRUB Pre-Config
# Set a green theme for the bootloader
set theme=${prefix}/themes/anonos/theme.txt

# Force text mode for compatibility
insmod all_video
insmod gfxterm
insmod gfxmenu

# Load fonts
if [ -f ${prefix}/fonts/unicode.pf2 ]; then
    set gfxmode=1024x768x32
    loadfont ${prefix}/fonts/unicode.pf2
fi

set gfxpayload=keep
terminal_input gfxterm
terminal_output gfxterm
