# AnonOS Hacker Lock Screen

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    color = rgba(000000ee)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(00ff00ff)
    inner_color = rgba(003300ff)
    font_color = rgba(00ff00ff)
    fade_on_empty = true
    placeholder_text = <i>[Access Code]</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(00ff00ff)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = █████╗ ███╗   ██╗ ██████╗ ███╗   ██╗ ██████╗ ███████╗
    color = rgba(00ff00aa)
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = 0, 140
    halign = center
    valign = center
}

