# AnonOS Syslinux Boot Config
PATH ../boot/syslinux

MENU TITLE AnonOS Boot Menu
MENU BACKGROUND splash.png
TIMEOUT 50
DEFAULT anonos

LABEL anonos
    MENU LABEL ^Boot AnonOS
    MENU DEFAULT
    LINUX ../../boot/vmlinuz-linux
    INITRD ../../boot/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ISO_LABEL% quiet loglevel=3

LABEL anonos-fallback
    MENU LABEL Boot AnonOS (fallback)
    LINUX ../../boot/vmlinuz-linux
    INITRD ../../boot/initramfs-linux-fallback.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ISO_LABEL% quiet loglevel=3

LABEL anonos-nouveau
    MENU LABEL Boot AnonOS (no modeset)
    LINUX ../../boot/vmlinuz-linux
    INITRD ../../boot/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ISO_LABEL% quiet loglevel=3 nomodeset

LABEL memtest86
    MENU LABEL MemTest86+ (RAM test)
    LINUX ../../boot/memtest86+/memtest
