# AnonOS - Hyprland Hacker Config
# █████╗ ███╗   ██╗ ██████╗ ███╗   ██╗ ██████╗ ███████╗
# ██╔══██╗████╗  ██║██╔═══██╗████╗  ██║██╔═══██╗██╔════╝
# ███████║██╔██╗ ██║██║   ██║██╔██╗ ██║██║   ██║███████╗
# ██╔══██║██║╚██╗██║██║   ██║██║╚██╗██║██║   ██║╚════██║
# ██║  ██║██║ ╚████║╚██████╔╝██║ ╚████║╚██████╔╝███████║
# ╚═╝  ╚═╝╚═╝  ╚═══╝ ╚═════╝ ╚═╝  ╚═══╝ ╚═════╝ ╚══════╝

monitor=,preferred,auto,1

exec-once = waybar & hyprpaper & dunst & /usr/lib/polkit-kde-authentication-agent-1 & hypridle & nm-applet --indicator & blueman-applet & anonos-firstboot

env = XCURSOR_SIZE,24
env = GTK_THEME,Adwaita-dark
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = _JAVA_AWT_WM_NONREPARENTING,1

$mainMod = SUPER

# Hacker green color scheme
$green = rgba(00ff00ff)
$darkGreen = rgba(00aa00ff)
$darkerGreen = rgba(005500ff)
$black = rgba(000000ff)
$white = rgba(00ff00ee)
$red = rgba(ff0000ff)
$yellow = rgba(ffff00ff)

general {
    gaps_in = 4
    gaps_out = 6
    border_size = 2
    col.active_border = $green
    col.inactive_border = $darkerGreen
    cursor_inactive_timeout = 3
    layout = dwindle
}

decoration {
    rounding = 8
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0
    blur {
        enabled = true
        size = 3
        passes = 2
        new_optimizations = on
        noise = 0.01
        contrast = 0.9
        brightness = 0.8
        popups = true
    }
    drop_shadow = yes
    shadow_range = 8
    shadow_render_power = 3
    col.shadow = rgba(00ff0022)
}

animations {
    enabled = yes
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    animation = windows, 1, 4, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = fade, 1, 4, smoothIn
    animation = workspaces, 1, 4, overshot, slidevert
    animation = border, 1, 10, default
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:super
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
        drag_lock = yes
    }
    sensitivity = 0
    accel_profile = flat
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vrr = 0
    animate_mouse_windowdragging = false
    enable_swallow = true
    swallow_regex = ^(kitty)$
}

binds {
    scroll_event_delay = 300
}

bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, Space, exec, anonos-menu
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, P, pseudo,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, R, exec, anonos-menu
bind = $mainMod, T, exec, kitty -e btop
bind = $mainMod, W, exec, kitty -e cmatrix

bind = $mainMod SHIFT, Q, exec, kitty -e nmtui
bind = $mainMod SHIFT, E, exec, kitty -e ranger
bind = $mainMod SHIFT, N, exec, kitty -e neovim
bind = $mainMod SHIFT, M, exec, kitty -e neomutt
bind = $mainMod SHIFT, T, exec, kitty -e tmux
bind = $mainMod SHIFT, W, exec, kitty -e btop
bind = $mainMod SHIFT, F, exec, firefox

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindel = ,XF86Search, exec, anonos-menu

windowrulev2 = float,class:(pavucontrol)
windowrulev2 = float,class:(blueman-manager)
windowrulev2 = float,class:(nm-connection-editor)
windowrulev2 = float,class:(org.gnome.Calculator)
windowrulev2 = float,title:(Volume Control)
windowrulev2 = idleinhibit,class:(mpv)
windowrulev2 = idleinhibit,class:(firefox)
